[pytest]
# Make the project root importable so test modules can do
#   `from image_preprocessing import ...`
#   `from extract_features import ...`
#   `from prebuilt_pipelines import ...`
# without installing the project as a package.
pythonpath = .

# Only collect from the dedicated tests/ directory.
testpaths = tests

# Discovery patterns (kept at pytest defaults, stated explicitly for clarity).
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers — registered here so `--strict-markers` (and CI) won't warn.
markers =
    slow: marks tests that are computationally expensive (deselect with '-m "not slow"').
    network: marks tests that would hit the network if not mocked (deselect with '-m "not network"').
    vgg16: marks tests exercising the VGG16 embedding path (mocked by default).

addopts = -ra --strict-markers
